[pytest]
# ---------------------------------------------------------------------------
# Banking ETL Automation - pytest configuration
# ---------------------------------------------------------------------------
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# -v          verbose
# -ra         show summary of all non-passing tests
# --html      pytest-html plugin's own report (in addition to our three
#             versioned reports built by reporting_engine/generate.py)
addopts =
    -v
    -ra
    --strict-markers
    --html=reports/pytest_html_report.html
    --self-contained-html

# hide the harmless "pandas prefers SQLAlchemy" notice
filterwarnings =
    ignore:pandas only supports SQLAlchemy:UserWarning

# ---------------------------------------------------------------------------
# Markers - used to select what to run, e.g.:
#     pytest -m "source_to_prestaging"
#     pytest -m "basic and accounts"
#     pytest -m transformation
# ---------------------------------------------------------------------------
markers =
    prerequisite: reset & reload all 4 layers - runs first, gates the whole suite
    source_to_prestaging: Layer 1 - Source to PreStaging tests
    prestaging_to_staging: Layer 2 - PreStaging to Staging tests
    staging_to_dwh: Layer 3 - Staging to DWH tests
    basic: basic reusable validations (count, null, duplicate, metadata, constraint)
    datamove: direct move exactness checks (Layer 1)
    transformation: transformation rule / data-quality checks (Layer 2 and 3)
    metadata_check: Metadata_Validation test case
    count_check: Count_Validation test case
    duplicate_check: Duplicate_Validation test case
    null_check: Null_Validation test case
    constraint_check: Constraint_Validation test case
    direct_move_check: direct_move_Validation test case
    accounts: Accounts table tests
    branches: Branches table tests
    customers: Customers table tests
    transactions: Transactions table tests
    fact: FactTransaction (DWH fact table) tests
