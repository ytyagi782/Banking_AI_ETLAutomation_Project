# ==========================================================================
# LAYER 2 :  PRE-STAGING  ->  STAGING
# Transformation rules, data cleaning and duplicate rejection happen here.
# Staging tables carry two extra columns:
#   IsValid          1 = accepted record , 0 = rejected record
#   RejectionReason  text reason when IsValid = 0
# Valid records (IsValid = 1) should still match PreStaging on business data.
# ==========================================================================

layer: "PreStagingToStaging"
source_db: "prestaging"      # -> Bank_PreStaging
target_db: "staging"         # -> Bank_Staging

# only the accepted rows are compared back to the source
valid_filter: "IsValid = 1"

tables:

  Accounts:
    source_table: "dbo.PS_Accounts"
    target_table: "dbo.STG_Accounts"
    load_proc: "dbo.usp_Load_STG_Accounts"
    key: ["AccountID"]
    compare_columns:
      - AccountID
      - AccountNumber
      - CustomerID
      - AccountType
      - Balance
      - CurrencyCode
    not_null_columns: ["AccountID", "AccountNumber", "CustomerID"]
    # data-quality / transformation rules applied to the STAGING (target) table
    transformations:
      - column: "CurrencyCode"
        rule: "length_equals"
        value: 3
        description: "Currency code must be a 3 letter ISO code"
      - column: "AccountNumber"
        rule: "no_whitespace"
        description: "Account number must be trimmed (no leading/trailing spaces)"
      - column: "Status"
        rule: "in_set"
        value: ["ACTIVE", "INACTIVE", "CLOSED", "DORMANT"]
        description: "Status must be standardised to an upper-case known value"

  Branches:
    source_table: "dbo.PS_Branches"
    target_table: "dbo.STG_Branches"
    load_proc: "dbo.usp_Load_STG_Branches"
    key: ["BranchID"]
    compare_columns:
      - BranchID
      - BranchCode
      - BranchName
      - City
      - StateName
      - Country
    not_null_columns: ["BranchID", "BranchCode"]
    transformations:
      - column: "BranchName"
        rule: "no_whitespace"
        description: "Branch name must be trimmed"
      - column: "Country"
        rule: "not_null"
        description: "Country must be populated after cleaning"

  Customers:
    source_table: "dbo.PS_Customers"
    target_table: "dbo.STG_Customers"
    load_proc: "dbo.usp_Load_STG_Customers"
    key: ["CustomerID"]
    compare_columns:
      - CustomerID
      - CustomerCode
      - CustomerName
      - DOB
      - Gender
      - Email
      - City
      - StateName
      - Country
    not_null_columns: ["CustomerID", "CustomerCode"]
    transformations:
      - column: "Email"
        rule: "regex"
        value: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
        description: "Email must be a valid email format"
      - column: "Gender"
        rule: "in_set"
        value: ["MALE", "FEMALE", "OTHER"]
        description: "Gender must be standardised to upper-case"
      - column: "CustomerName"
        rule: "no_whitespace"
        description: "Customer name must be trimmed"

  Transactions:
    source_table: "dbo.PS_Transactions"
    target_table: "dbo.STG_Transactions"
    load_proc: "dbo.usp_Load_STG_Transactions"
    key: ["TransactionID"]
    compare_columns:
      - TransactionID
      - TransactionNumber
      - AccountID
      - BranchID
      - TransactionDate
      - TransactionType
      - Amount
      - CurrencyCode
    not_null_columns: ["TransactionID", "TransactionNumber", "AccountID", "BranchID"]
    transformations:
      - column: "Amount"
        rule: "min_value"
        value: 0
        description: "Transaction amount must not be negative"
      - column: "TransactionType"
        rule: "in_set"
        value: ["CREDIT", "DEBIT", "TRANSFER", "WITHDRAWAL", "DEPOSIT"]
        description: "Transaction type must be standardised to upper-case"
