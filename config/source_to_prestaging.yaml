# ==========================================================================
# LAYER 1 :  SOURCE  ->  PRE-STAGING   (direct move, no transformation)
# The data must arrive in PreStaging exactly as it is in Source.
# ==========================================================================

layer: "SourceToPreStaging"
source_db: "source"          # -> Bank_Source   (see settings.yaml -> databases)
target_db: "prestaging"      # -> Bank_PreStaging

tables:

  Accounts:
    source_table: "dbo.SRC_Accounts"
    target_table: "dbo.PS_Accounts"
    load_proc: "dbo.usp_Load_PS_Accounts"
    key: ["AccountID"]
    # columns that must match exactly between source and target (direct move)
    compare_columns:
      - AccountID
      - AccountNumber
      - CustomerID
      - AccountType
      - OpenDate
      - CloseDate
      - Status
      - Balance
      - CurrencyCode
    not_null_columns: ["AccountID", "AccountNumber", "CustomerID"]

  Branches:
    source_table: "dbo.SRC_Branches"
    target_table: "dbo.PS_Branches"
    load_proc: "dbo.usp_Load_PS_Branches"
    key: ["BranchID"]
    compare_columns:
      - BranchID
      - BranchCode
      - BranchName
      - City
      - StateName
      - Country
      - ManagerName
    not_null_columns: ["BranchID", "BranchCode"]

  Customers:
    source_table: "dbo.SRC_Customers"
    target_table: "dbo.PS_Customers"
    load_proc: "dbo.usp_Load_PS_Customers"
    key: ["CustomerID"]
    compare_columns:
      - CustomerID
      - CustomerCode
      - CustomerName
      - DOB
      - Gender
      - Email
      - Phone
      - AddressLine
      - City
      - StateName
      - Country
    not_null_columns: ["CustomerID", "CustomerCode"]

  Transactions:
    source_table: "dbo.SRC_Transactions"
    target_table: "dbo.PS_Transactions"
    load_proc: "dbo.usp_Load_PS_Transactions"
    key: ["TransactionID"]
    compare_columns:
      - TransactionID
      - TransactionNumber
      - AccountID
      - BranchID
      - TransactionDate
      - TransactionType
      - Amount
      - CurrencyCode
      - Description
    not_null_columns: ["TransactionID", "TransactionNumber", "AccountID", "BranchID"]

  # ------------------------------------------------------------------------
  # NEW ENTITIES (generated by database/generate_schema.py)
  # ------------------------------------------------------------------------

  Employees:
    source_table: "dbo.SRC_Employees"
    target_table: "dbo.PS_Employees"
    load_proc: "dbo.usp_Load_PS_Employees"
    key: ["EmployeeID"]
    compare_columns:
      - EmployeeID
      - EmployeeCode
      - FirstName
      - LastName
      - Email
      - Phone
      - Designation
      - BranchID
      - Salary
      - HireDate
      - Status
    not_null_columns: ["EmployeeID", "EmployeeCode"]

  Loans:
    source_table: "dbo.SRC_Loans"
    target_table: "dbo.PS_Loans"
    load_proc: "dbo.usp_Load_PS_Loans"
    key: ["LoanID"]
    compare_columns:
      - LoanID
      - LoanNumber
      - CustomerID
      - ProductType
      - PrincipalAmount
      - InterestRate
      - TermMonths
      - DisbursementDate
      - OutstandingAmount
      - Status
    not_null_columns: ["LoanID", "LoanNumber", "CustomerID"]

  Cards:
    source_table: "dbo.SRC_Cards"
    target_table: "dbo.PS_Cards"
    load_proc: "dbo.usp_Load_PS_Cards"
    key: ["CardID"]
    compare_columns:
      - CardID
      - CardNumber
      - AccountID
      - CardType
      - Network
      - CreditLimit
      - IssueDate
      - ExpiryDate
      - Status
    not_null_columns: ["CardID", "CardNumber", "AccountID"]

  Merchants:
    source_table: "dbo.SRC_Merchants"
    target_table: "dbo.PS_Merchants"
    load_proc: "dbo.usp_Load_PS_Merchants"
    key: ["MerchantID"]
    compare_columns:
      - MerchantID
      - MerchantCode
      - MerchantName
      - Category
      - City
      - Country
      - Status
    not_null_columns: ["MerchantID", "MerchantCode"]

  CardTransactions:
    source_table: "dbo.SRC_CardTransactions"
    target_table: "dbo.PS_CardTransactions"
    load_proc: "dbo.usp_Load_PS_CardTransactions"
    key: ["CardTransactionID"]
    compare_columns:
      - CardTransactionID
      - CardID
      - MerchantID
      - CardTxnNumber
      - TxnDate
      - Amount
      - CurrencyCode
      - TxnType
      - Status
    not_null_columns: ["CardTransactionID", "CardTxnNumber"]

  LoanPayments:
    source_table: "dbo.SRC_LoanPayments"
    target_table: "dbo.PS_LoanPayments"
    load_proc: "dbo.usp_Load_PS_LoanPayments"
    key: ["LoanPaymentID"]
    compare_columns:
      - LoanPaymentID
      - LoanID
      - PaymentNumber
      - PaymentDate
      - PaymentAmount
      - PrincipalComponent
      - InterestComponent
      - PaymentMethod
    not_null_columns: ["LoanPaymentID", "PaymentNumber"]
