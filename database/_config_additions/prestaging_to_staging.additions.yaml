# Append these under `tables:` in config/prestaging_to_staging.yaml

  Employees:
    source_table: "dbo.PS_Employees"
    target_table: "dbo.STG_Employees"
    load_proc: "dbo.usp_Load_STG_Employees"
    key: ["EmployeeID"]
    compare_columns:
      - EmployeeID
      - EmployeeCode
      - FirstName
      - LastName
      - Email
      - Phone
      - Designation
      - BranchID
      - Salary
      - HireDate
      - Status
    not_null_columns: ['EmployeeID', 'EmployeeCode']
    transformations:
      - column: "FirstName"
        rule: "no_whitespace"
        description: "First name must be trimmed"
      - column: "LastName"
        rule: "no_whitespace"
        description: "Last name must be trimmed"
      - column: "Email"
        rule: "regex"
        value: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
        description: "Email must be a valid email format"
      - column: "Status"
        rule: "in_set"
        value: ["ACTIVE", "INACTIVE", "ONLEAVE", "RESIGNED"]
        description: "Status standardised to an upper-case known value"

  Loans:
    source_table: "dbo.PS_Loans"
    target_table: "dbo.STG_Loans"
    load_proc: "dbo.usp_Load_STG_Loans"
    key: ["LoanID"]
    compare_columns:
      - LoanID
      - LoanNumber
      - CustomerID
      - ProductType
      - PrincipalAmount
      - InterestRate
      - TermMonths
      - DisbursementDate
      - OutstandingAmount
      - Status
    not_null_columns: ['LoanID', 'LoanNumber', 'CustomerID']
    transformations:
      - column: "LoanNumber"
        rule: "no_whitespace"
        description: "Loan number must be trimmed"
      - column: "ProductType"
        rule: "in_set"
        value: ["HOME", "AUTO", "PERSONAL", "EDUCATION", "BUSINESS"]
        description: "Product type standardised to upper-case"
      - column: "PrincipalAmount"
        rule: "min_value"
        value: 0
        description: "Principal amount must not be negative"
      - column: "Status"
        rule: "in_set"
        value: ["ACTIVE", "CLOSED", "DEFAULTED", "PENDING"]
        description: "Status standardised to an upper-case known value"

  Cards:
    source_table: "dbo.PS_Cards"
    target_table: "dbo.STG_Cards"
    load_proc: "dbo.usp_Load_STG_Cards"
    key: ["CardID"]
    compare_columns:
      - CardID
      - CardNumber
      - AccountID
      - CardType
      - Network
      - CreditLimit
      - IssueDate
      - ExpiryDate
      - Status
    not_null_columns: ['CardID', 'CardNumber', 'AccountID']
    transformations:
      - column: "CardType"
        rule: "in_set"
        value: ["DEBIT", "CREDIT", "PREPAID"]
        description: "Card type standardised to upper-case"
      - column: "Network"
        rule: "in_set"
        value: ["VISA", "MASTERCARD", "RUPAY", "AMEX"]
        description: "Card network standardised to upper-case"
      - column: "Status"
        rule: "in_set"
        value: ["ACTIVE", "BLOCKED", "EXPIRED"]
        description: "Status standardised to an upper-case known value"

  Merchants:
    source_table: "dbo.PS_Merchants"
    target_table: "dbo.STG_Merchants"
    load_proc: "dbo.usp_Load_STG_Merchants"
    key: ["MerchantID"]
    compare_columns:
      - MerchantID
      - MerchantCode
      - MerchantName
      - Category
      - City
      - Country
      - Status
    not_null_columns: ['MerchantID', 'MerchantCode']
    transformations:
      - column: "MerchantName"
        rule: "no_whitespace"
        description: "Merchant name must be trimmed"
      - column: "Status"
        rule: "in_set"
        value: ["ACTIVE", "INACTIVE", "SUSPENDED"]
        description: "Status standardised to an upper-case known value"

  CardTransactions:
    source_table: "dbo.PS_CardTransactions"
    target_table: "dbo.STG_CardTransactions"
    load_proc: "dbo.usp_Load_STG_CardTransactions"
    key: ["CardTransactionID"]
    compare_columns:
      - CardTransactionID
      - CardID
      - MerchantID
      - CardTxnNumber
      - TxnDate
      - Amount
      - CurrencyCode
      - TxnType
      - Status
    not_null_columns: ['CardTransactionID', 'CardTxnNumber']
    transformations:
      - column: "Amount"
        rule: "min_value"
        value: 0
        description: "Transaction amount must not be negative"
      - column: "CurrencyCode"
        rule: "length_equals"
        value: 3
        description: "Currency code must be a 3 letter ISO code"
      - column: "TxnType"
        rule: "in_set"
        value: ["PURCHASE", "WITHDRAWAL", "REFUND", "REVERSAL"]
        description: "Transaction type standardised to upper-case"
      - column: "Status"
        rule: "in_set"
        value: ["APPROVED", "DECLINED", "PENDING"]
        description: "Status standardised to an upper-case known value"

  LoanPayments:
    source_table: "dbo.PS_LoanPayments"
    target_table: "dbo.STG_LoanPayments"
    load_proc: "dbo.usp_Load_STG_LoanPayments"
    key: ["LoanPaymentID"]
    compare_columns:
      - LoanPaymentID
      - LoanID
      - PaymentNumber
      - PaymentDate
      - PaymentAmount
      - PrincipalComponent
      - InterestComponent
      - PaymentMethod
    not_null_columns: ['LoanPaymentID', 'PaymentNumber']
    transformations:
      - column: "PaymentAmount"
        rule: "min_value"
        value: 0
        description: "Payment amount must not be negative"
      - column: "PaymentMethod"
        rule: "in_set"
        value: ["CASH", "CHEQUE", "ONLINE", "AUTODEBIT"]
        description: "Payment method standardised to upper-case"
